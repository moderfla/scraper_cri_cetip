name: Scraper

on:
  push:
    paths:
      - .github/workflows/scraper_cetip.yml # Only run a new workflow every time this file (flat.yaml) file changes
  workflow_dispatch: # Required even though this is currently empty
  schedule:
    - cron: '5 8 * * *' # Run this workflow every 5 minutes

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: checkout repo content
        uses: actions/checkout@v4 # checkout the repository content to github runner

      - name: Copiar Arquivos
        run: cp emissoes_cri.csv emissoes_cri-old.csv 
      - name: Baixar dados CRI
        run: bash scraper.sh
      - name: Instalar csv-diff
        run: pip install csv-diff
      - name: Diff Arquivos
        run: csv-diff emissoes_cri-old.csv emissoes_cri.csv --key=1 > message.txt
      - name: commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          timestamp=$(date -u)
          git commit -F message.txt || exit 0
          git push
